# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Build .NET lib

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build solution
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        configuration: [Debug, Release]
        dotnet-version: [ '2.0.x', '6.0.x', '8.0.x' ]

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Display dotnet version
      run: dotnet --version
      
    - name: Git Version
      id: version
      uses: codacy/git-version@2.7.1
      with:
        release-branch: main

    - name: Set version in all AssemblyInfo.cs files
      uses: secondbounce/assemblyinfo-update@v2
      with:
        version: ${{ steps.version.outputs.version }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }} # Unique key for the cache
        restore-keys: |
          ${{ runner.os }}-nuget-
          
    - name: Restore dependencies
      run: dotnet restore --p:ContinuousIntegrationBuild=true
      
    - name: Build
      run: dotnet build --no-restore --configuration ${{ matrix.configuration }} --p:ContinuousIntegrationBuild=true

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: build

    steps:
    
    - name: Test
      run: dotnet test --no-build --verbosity normal -p:CollectCoverage=true -p:CoverletOutput=TestResults/ -p:CoverletOutputFormat=opencover

    - name: Create Test Coverage Badge
      uses: simon-k/dotnet-code-coverage-badge@v1.0.0
      id: create_coverage_badge
      with:
        label: Unit Test Coverage
        color: brightgreen
        path: TeamTools.SSDT.ProjectValidatorTests/TestResults/coverage.opencover.xml
        gist-filename: TeamTools.Linter.SSDT.code-coverage.json
        gist-id: ${{ env.GIST_COVERAGE_ID }}
        gist-auth-token: ${{ secrets.GIST_AUTH_TOKEN }}

    - name: Print code coverage
      run: echo "Code coverage percentage ${{steps.create_coverage_badge.outputs.percentage}}%"
